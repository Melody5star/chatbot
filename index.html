<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chatbot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f0f0f; color: #fff; display: flex; flex-direction: column; height: 100vh; }
    #header { padding: 16px 24px; background: #1a1a1a; border-bottom: 1px solid #333; }
    #header h1 { font-size: 20px; }
    #chat-box { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 12px; }
    .message { max-width: 70%; padding: 12px 16px; border-radius: 12px; line-height: 1.5; }
    .user { background: #2f6fff; align-self: flex-end; }
    .assistant { background: #1e1e1e; align-self: flex-start; border: 1px solid #333; }
    #input-area { display: flex; padding: 16px; gap: 10px; background: #1a1a1a; border-top: 1px solid #333; }
    #user-input { flex: 1; padding: 12px 16px; border-radius: 8px; border: 1px solid #444; background: #2a2a2a; color: #fff; font-size: 15px; outline: none; }
    #send-btn { padding: 12px 20px; background: #2f6fff; border: none; border-radius: 8px; color: #fff; cursor: pointer; font-size: 15px; }
    #send-btn:hover { background: #1a55e0; }
    .typing { color: #888; font-style: italic; font-size: 14px; }
  </style>
</head>
<body>

  <div id="header">
    <h1>🤖 AI Chatbot</h1>
  </div>

  <div id="chat-box">
    <div class="message assistant">👋 Hi! I'm your AI assistant. Ask me anything!</div>
  </div>

  <div id="input-area">
    <input id="user-input" type="text" placeholder="Type your message..." />
    <button id="send-btn">Send</button>
  </div>

<script>
  const chatBox = document.getElementById("chat-box");
  const userInput = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");

  
  const history = [];

  function addMessage(role, text) {
    const div = document.createElement("div");
    div.className = `message ${role}`;
    div.textContent = text;
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text) return;

    addMessage("user", text);
    history.push({ role: "user", content: text });
    userInput.value = "";

    const typing = document.createElement("div");
    typing.className = "typing";
    typing.textContent = "Thinking...";
    chatBox.appendChild(typing);

    const response = await fetch("/api/chat", {
  method: "POST",
  headers: { "Content-Type": "application/json" },
  body: JSON.stringify({ messages: history })
});
    const data = await response.json();
    const reply = data.content[0].text;

    chatBox.removeChild(typing);
    addMessage("assistant", reply);
    history.push({ role: "assistant", content: reply });
  }

  sendBtn.addEventListener("click", sendMessage);
  userInput.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
</script>

</body>
</html>
